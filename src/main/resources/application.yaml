spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: azurion-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/azurion}
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:30}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        show_sql: false
        jdbc.time_zone: UTC
        multiTenancy: SCHEMA
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration/public
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:8MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:10MB}
      file-size-threshold: 0B

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

security:
  jwt:
    secret: ${JWT_SECRET:}
    issuer: ${JWT_ISSUER:azurion}
    expiration-minutes: ${JWT_EXP_MIN:120}

azurion:
  security:
    email-secret-key: ${AZURION_EMAIL_SECRET_KEY:}
    email-secret-key-previous: ${AZURION_EMAIL_SECRET_KEY_PREVIOUS:}
    crm-secret-key: ${AZURION_CRM_SECRET_KEY:}
    bootstrap-admin:
      username: ${AZURION_BOOTSTRAP_ADMIN_USERNAME:}
      password: ${AZURION_BOOTSTRAP_ADMIN_PASSWORD:}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
    rate-limit:
      enabled: ${RATE_LIMIT_ENABLED:true}
      auth-requests-per-minute: ${RATE_LIMIT_AUTH_PER_MINUTE:10}
      public-requests-per-minute: ${RATE_LIMIT_PUBLIC_PER_MINUTE:60}
      max-clients: ${RATE_LIMIT_MAX_CLIENTS:10000}
      distributed-enabled: ${RATE_LIMIT_DISTRIBUTED_ENABLED:true}
      cleanup-delay-millis: ${RATE_LIMIT_CLEANUP_DELAY_MS:60000}
      trusted-proxies: ${RATE_LIMIT_TRUSTED_PROXIES:127.0.0.1,::1}
  email:
    transport:
      connect-timeout-millis: ${SMTP_CONNECT_TIMEOUT_MS:10000}
      read-timeout-millis: ${SMTP_READ_TIMEOUT_MS:20000}
      write-timeout-millis: ${SMTP_WRITE_TIMEOUT_MS:20000}
      tls-protocols: ${SMTP_TLS_PROTOCOLS:TLSv1.2 TLSv1.3}
      check-server-identity: ${SMTP_CHECK_SERVER_IDENTITY:true}
  whatsapp:
    graph-base-url: ${WHATSAPP_GRAPH_BASE_URL:https://graph.facebook.com}
    graph-api-version: ${WHATSAPP_GRAPH_API_VERSION:v25.0}
    connect-timeout-millis: ${WHATSAPP_CONNECT_TIMEOUT_MS:5000}
    read-timeout-millis: ${WHATSAPP_READ_TIMEOUT_MS:15000}
  multitenancy:
    default-schema: public
    tenant-header: X-Tenant-Id
    run-migrations-on-startup: ${TENANT_MIGRATIONS_ON_STARTUP:true}
    public-endpoints: ${PUBLIC_ENDPOINTS:/v1/auth/public/login,/v1/auth/tenant/login,/v1/public/crm/leads,/public/crm/leads,/v1/public/crm/catalogo/**,/public/crm/catalogo/**,/v1/public/crm/whatsapp/**,/public/crm/whatsapp/**,/v1/public/crm/meta/**,/public/crm/meta/**,/v1/facturador/callback/**,/actuator/health,/files/**}
  storage:
    public-files:
      root-dir: ${AZURION_PUBLIC_FILES_DIR:${user.dir}/storage/public-files}
    private-files:
      root-dir: ${AZURION_PRIVATE_FILES_DIR:${user.dir}/storage/private-files}
  facturador:
    base-url: ${FACTURADOR_BASE_URL:http://127.0.0.1:8000}
    api-prefix: ${FACTURADOR_API_PREFIX:/api}
    connect-timeout-millis: ${FACTURADOR_CONNECT_TIMEOUT_MS:5000}
    read-timeout-millis: ${FACTURADOR_READ_TIMEOUT_MS:20000}
    wait-processed-enabled: ${FACTURADOR_WAIT_PROCESSED_ENABLED:false}
    wait-processed-timeout-millis: ${FACTURADOR_WAIT_PROCESSED_TIMEOUT_MS:90000}
    wait-processed-poll-interval-millis: ${FACTURADOR_WAIT_PROCESSED_POLL_INTERVAL_MS:1500}
    default-api-key: ${FACTURADOR_API_KEY:}
    tenant-api-keys: {}
    callback:
      enabled: ${FACTURADOR_CALLBACK_ENABLED:true}
      api-key: ${FACTURADOR_CALLBACK_API_KEY:}
      secret: ${FACTURADOR_CALLBACK_SECRET:}
      header-api-key: ${FACTURADOR_CALLBACK_HEADER_API_KEY:X-API-Key}
      header-signature: ${FACTURADOR_CALLBACK_HEADER_SIGNATURE:X-Signature}
      header-timestamp: ${FACTURADOR_CALLBACK_HEADER_TIMESTAMP:X-Timestamp}
      header-nonce: ${FACTURADOR_CALLBACK_HEADER_NONCE:X-Nonce}
      timestamp-tolerance-seconds: ${FACTURADOR_CALLBACK_TOLERANCE_SECONDS:300}
      nonce-ttl-seconds: ${FACTURADOR_CALLBACK_NONCE_TTL_SECONDS:600}
    outbox:
      enabled: ${FACTURADOR_OUTBOX_ENABLED:true}
      initial-delay-millis: ${FACTURADOR_OUTBOX_INITIAL_DELAY_MS:5000}
      poll-delay-millis: ${FACTURADOR_OUTBOX_POLL_DELAY_MS:2000}
      cleanup-cron: ${FACTURADOR_OUTBOX_CLEANUP_CRON:0 30 3 * * *}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html
