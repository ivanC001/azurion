spring:
  config:
    import: ""
  datasource:
    url: jdbc:h2:mem:azurion-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
  task:
    scheduling:
      enabled: false

security:
  jwt:
    secret: test-jwt-secret-with-at-least-32-bytes-long
    issuer: azurion-test
    expiration-minutes: 30

azurion:
  security:
    email-secret-key: test-email-secret-with-at-least-32-bytes-long
    crm-secret-key: test-crm-secret-with-at-least-32-bytes-long
    rate-limit:
      distributed-enabled: false
  multitenancy:
    run-migrations-on-startup: false
  facturador:
    outbox:
      enabled: false
  storage:
    public-files:
      root-dir: ${java.io.tmpdir}/azurion-test/public
    private-files:
      root-dir: ${java.io.tmpdir}/azurion-test/private
